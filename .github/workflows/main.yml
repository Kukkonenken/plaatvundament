name: Deploy to Zone

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH setup — write private key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: SSH keyscan — trust host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HOST_SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -vrm --exclude '.git*' --exclude '.github*' ./* virt140108@${{ secrets.HOST_SERVER_IP }}:/data01/virt140108/domeenid/www.plaatvundament.com/htdocs/
