name: Deploy to Zone

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOST_SERVER_IP }}
          REMOTE_USER: virt140108
          SOURCE: "./"
          TARGET: "/data01/virt140108/domeenid/www.plaatvundament.com/htdocs/"
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: "/.git/, /.github/, /node_modules/, .gitignore, README.md"
